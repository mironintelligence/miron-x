name: Tweet 7 - London Early Morning (10am GMT / 13:00 TRT)

on:
  schedule:
    - cron: '0 10 * * *'   # 10am GMT / 6am EST / 13:00 TRT  [London]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
      - run: git pull --rebase origin main || true
      - env:
          XACTIONS_SESSION_COOKIE: ${{ secrets.XACTIONS_SESSION_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWITTER_HANDLE: kerimaydemirco
          GROQ_MODEL: llama-3.3-70b-versatile
          TWEET_SLOT: "7"
          LONDON_MODE: "true"
        run: node src/post.js
      - run: |
          git pull --rebase origin main || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "data: auto [skip ci]"
          git push || true
