name: Analytics — Self-Improving Loop

on:
  schedule:
    # 04:00 UTC = 07:00 TRT — runs after all daily tweets are posted
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  analytics:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    env:
      TWITTER_HANDLE: kerimaydemirco
      GROQ_MODEL: llama-3.3-70b-versatile
      ANALYTICS_TOP_N: "15"
      MIN_DATA_POINTS: "8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

      - name: Pull latest data
        run: git pull --rebase origin main || true

      - name: 1. Track engagement (live timeline + API fallback)
        run: node src/analytics.js
        env:
          XACTIONS_SESSION_COOKIE: ${{ secrets.XACTIONS_SESSION_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: 2. Brain analysis (find what works)
        run: node src/brain.js
        env:
          XACTIONS_SESSION_COOKIE: ${{ secrets.XACTIONS_SESSION_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: 3. Self-improve (update dynamic_config + report)
        run: node src/self-improve.js
        env:
          XACTIONS_SESSION_COOKIE: ${{ secrets.XACTIONS_SESSION_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: 4. Track growth (follower count snapshot)
        run: node src/growth.js
        env:
          XACTIONS_SESSION_COOKIE: ${{ secrets.XACTIONS_SESSION_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit all data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --cached --quiet || git commit -m 'analytics: engagement + brain + self-improve + growth'
          git push || true
