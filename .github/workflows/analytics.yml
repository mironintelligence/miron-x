name: Analytics — Self-Improving Loop

on:
  schedule:
    # 11pm EST / 07:00 TRT — after all tweets are posted
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

      - name: Pull latest data
        run: git pull --rebase origin main || true

      - name: Run analytics
        run: node src/analytics.js
        env:
          XACTIONS_SESSION_COOKIE: ${{ secrets.XACTIONS_SESSION_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/posted.json data/top_tweets.json
          git diff --cached --quiet || git commit -m 'analytics: update engagement scores + top tweets'
          git push
