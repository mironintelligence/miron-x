name: 🤝 Engagement Routines
on:
  schedule:
    - cron: '0 13 * * *'   # 9am EST — full (like+reply) US morning
    - cron: '0 17 * * *'   # 1pm EST — like only, US midday
    - cron: '0 22 * * *'   # 6pm EST — reply only, US evening peak
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: all / like / reply / follow'
        default: 'all'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: |
          sudo apt-get install -y -q \
            libasound2 libatk1.0-0 libatk-bridge2.0-0 libcairo2 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libglib2.0-0 libgtk-3-0 libnspr4 \
            libnss3 libpango-1.0-0 libx11-6 libxcb1 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxrandr2 libxss1 libxtst6 xdg-utils

      - run: npm ci

      - name: Run engagement
        env:
          XACTIONS_SESSION_COOKIE: ${{ secrets.XACTIONS_SESSION_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENGAGE_MODE: ${{ github.event.inputs.mode || 'all' }}
        run: node src/engage.js

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "🤝 auto [skip ci]"
          git push || true
