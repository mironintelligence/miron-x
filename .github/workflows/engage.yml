name: 🤝 Engagement Routines
on:
  schedule:
    - cron: '0 13 * * *'   # 9am EST — full (like+reply)
    - cron: '0 17 * * *'   # 1pm EST — like only
    - cron: '0 22 * * *'   # 6pm EST — reply only
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: all / like / reply / follow'
        default: 'all'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }

      - run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

      - name: Run engagement
        env:
          XACTIONS_SESSION_COOKIE: ${{ secrets.XACTIONS_SESSION_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENGAGE_MODE: ${{ github.event.inputs.mode || 'all' }}
        run: node src/engage.js

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "🤝 auto [skip ci]"
          git push || true
